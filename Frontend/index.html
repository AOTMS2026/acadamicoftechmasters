<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-M5GG4WXGQD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-M5GG4WXGQD');
  </script>
  <title>Academy of Tech Masters | Top Software Training Institutes in Vijayawada</title>
  <meta name="description"
    content="Looking for software jobs in Vijayawada? Join the best software training institute for Full Stack Developer courses, AWS, DevOps, and UI UX Design training." />
  <meta name="keywords"
    content="software jobs in vijayawada, software training institutes in vijayawada, full stack developer course in vijayawada, devops training in vijayawada, aws training in vijayawada, ui ux design course in vijayawada, academy of tech masters" />
  <meta name="author" content="Academy of Tech Masters" />
  <meta name="robots" content="index, follow" />
  <!--
    NOTE (SEO fix): a hardcoded <link rel="canonical" href="https://academyoftechmasters.com/"> used to
    live here. Because this is a single-page app, that ONE tag applied to every route
    (courses, blog posts, about-us, etc). Each page also injects its own correct
    canonical via <SEO>/react-helmet-async at runtime, so pages ended up with TWO
    canonical tags: one to the homepage (the raw HTML Google sees first) and one to
    the real page (added later by JS). With conflicting canonical signals Google may
    pick either one — in Search Console this showed up as "Alternative page with
    proper canonical tag" pointing every inner page back to "/". Removing the static
    tag lets each page's own <SEO canonical="..."> be the single source of truth.
    The homepage's SEO component already sets canonical="https://academyoftechmasters.com/".
  -->

  <meta property="og:title" content="Academy of Tech Masters | Job-Ready IT Training in Vijayawada" />
  <meta property="og:description"
    content="Master AI, Cloud, DevOps & Full Stack development with real-world projects and placement support in Vijayawada." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/brand-logo-new.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@AcademyOfTechMasters" />
  <meta name="twitter:image" content="/og-image.png" />

  <link rel="icon" type="image/png" href="/brand-logo-new.png" />
</head>

</body>

</html>
